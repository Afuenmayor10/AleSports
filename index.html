<body>

    <!-- HEADER -->

    <header>

        <div class="logo-titulo">

            <img src="img/logo.png" alt="Logo">

            

        </div>

        <nav>

            <a href="#">Inicio</a>
            <a href="#productos">Productos</a>
            <a href="#contacto">Contacto</a>

        </nav>

    </header>

    <!-- BANNER -->

    <section class="banner">

        <div class="contenido-banner">

            <h2>
                TODO PARA TU <br>
                <span>ENTRENAMIENTO</span>
            </h2>

            <p>
                Encuentra todo para realizar tu deporte favorito.
            </p>

            <button>EMPIEZA A COMPRAR AHORA</button>
        <section id="productos"></section>
        </div>

    </section>
 
    <!-- PRODUCTOS -->

 <section class="productos">

    <h2 class="titulo-seccion">PRODUCTOS DISPONIBLES</h2>

    <div class="contenedor-productos" id="contenedor-productos">
    
    </div>
 <section id="contacto"></section>
</section>

    <!-- CONTACTO -->

    <section class="contacto">
   <section id="contacto"></section>
        <div class="texto-contacto">

            <h2>CONTACTO</h2>

            <p>
                   ¿Tienes alguna consulta? <br>
                Escríbenos y te responderemos.
            </p>

        </div>

       <form action="https://formspree.io/f/xvzybada" method="POST">

    <div class="fila-formulario">

        <input 
            type="text" 
            name="nombre"
            id="nombre"
            placeholder="Nombre" 
            required
        >
        <input 
            type="text" 
            name="apellido"
            id="apellido"
            placeholder="Apellido" 
            required
        >
        <textarea 
            name="mensaje"
            id="mensaje"
            placeholder="Mensaje"
            required
        ></textarea>

    </div>

    <input 
        type="email" 
        id="email"
        name="email"
        placeholder="Correo electrónico" 
        required
    >

    <button type="submit">
        ENVIAR MENSAJE
    </button>

</form>

    <!-- MAPA GOOGLE MAPS -->

</div>
